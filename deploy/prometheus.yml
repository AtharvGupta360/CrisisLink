# Prometheus scrape config. Prometheus PULLS metrics from targets on an interval
# (it is not pushed to). Each `job` is a set of targets sharing a purpose.
global:
  scrape_interval: 15s        # how often to pull each target
  scrape_timeout: 10s

scrape_configs:
  # Prometheus scraping itself — the canonical "is Prometheus alive" job.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The CrisisLink app. It runs on the HOST during dev, so from inside the
  # Prometheus container we reach the host via Docker's special DNS name
  # `host.docker.internal`. This target will show as DOWN until we expose
  # /metrics in P25 — that's expected for now.
  - job_name: crisislink
    static_configs:
      - targets: ["host.docker.internal:8080"]
