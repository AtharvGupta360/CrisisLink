# Prometheus scrape config. Prometheus PULLS metrics from targets on an interval
# (nothing is pushed to it). Each `job` is a set of targets sharing a purpose.
global:
  scrape_interval: 15s        # how often to pull each target
  scrape_timeout: 10s

scrape_configs:
  # Prometheus scraping itself — the canonical "is Prometheus alive" job.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The CrisisLink API. It runs on the HOST during development, so from inside the
  # Prometheus container we reach it via Docker's special DNS name
  # `host.docker.internal`. In a compose/k8s deployment this becomes the service
  # name instead.
  - job_name: crisislink-api
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          component: api

  # The relay is a SEPARATE PROCESS with its own in-memory counters, so it needs
  # its own scrape target — Prometheus cannot reach them through the API. This is
  # inherent to pull-based monitoring: every process holding metrics must be
  # individually scrapeable.
  #
  # It shows DOWN whenever the relay is not running, which is itself useful: `up`
  # is a metric, so "the relay is dead" is alertable without any extra work.
  - job_name: crisislink-relay
    static_configs:
      - targets: ["host.docker.internal:9101"]
        labels:
          component: relay
